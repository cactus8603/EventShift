project:
  name: EventShift-CoSEC-RGB

data:
  cosec_root: ${COSEC_ROOT:-/path/to/cosec}
  train_dataset: cosec_unified_classcover_v1_train
  val_datasets:
    - cosec_unified_classcover_v1_day_val
    - cosec_unified_classcover_v1_night_val

model:
  name: swinl_rgb_baseline
  backend_config: ${EVENTSHIFT_ROOT:-.}/configs/mask2former/Mask2Former_SwinL_FullDSEC_CoSEC_ACDC_UnifiedClassCover.yaml
  rgb_encoder: swin_large
  event_encoder: none
  fusion: none

event:
  enabled: false

train:
  output_dir: ${EVENTSHIFT_ROOT:-.}/outputs/cosec_rgb_baseline
  num_gpus: 1
  batch_size: 3
  lr: 0.000005

inference:
  output_dir: ${EVENTSHIFT_ROOT:-.}/outputs/cosec_rgb_baseline
  progress_desc: mask2former_rgb_baseline

checkpoints:
  init_weights: null
