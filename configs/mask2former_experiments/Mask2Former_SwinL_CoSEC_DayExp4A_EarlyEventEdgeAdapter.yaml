_BASE_: Mask2Former_SwinL_CoSEC_EventRes34_Epoch.yaml
DATASETS:
  TRAIN: ("cosec_day_train_event",)
  TEST: ("cosec_day_val_event",)
MODEL:
  WEIGHTS: "work_dirs/day-exp1c_stageC_head_from_stageB_strong_bs8/model_final.pth"
  TRAINABLE_PREFIXES:
    - "early_event_edge_adapter."
  EVENT_FUSION:
    ENABLED: False
  EVENT_EDGE:
    ENABLED: False
    IN_CHANNELS: 9
    NUM_CLASSES: 19
    CLASS_AWARE: False
  EVENT_EDGE_GUIDE:
    ENABLED: False
  EVENT_PRESERVE:
    ENABLED: False
  DAY_EVENT_BOUNDARY_REFINER:
    ENABLED: False
  EARLY_EVENT_EDGE_ADAPTER:
    ENABLED: True
    IN_CHANNELS: 9
    STAT_CHANNELS: 4
    HIDDEN_DIM: 64
    INIT_ALPHA: 0.001
    ALPHA_MAX: 0.020
    GATE_BIAS: -5.0
    EDGE_PROB_POWER: 2.0
    USE_EVENT_RELIABILITY: True
    RELIABILITY_FLOOR: 0.10
    RELIABILITY_THRESHOLD: 0.05
    EVENT_EDGE_THRESHOLD: 0.20
    CONFIDENCE_THRESHOLD: 0.65
    MARGIN_THRESHOLD: 0.25
    ENTROPY_THRESHOLD: 0.55
    REQUIRE_BOUNDARY: True
    BOUNDARY_RADIUS: 3
    GATE_BCE_WEIGHT: 0.10
    GATE_POSITIVE_WEIGHT: 4.0
    GATE_NEGATIVE_WEIGHT: 1.0
    GATE_SUPERVISION_DETACH: True
    LOG_STATS: True
SOLVER:
  IMS_PER_BATCH: 4
  BASE_LR: 0.000002
  AMP:
    ENABLED: True
TEST:
  EVAL_PERIOD: 480
TRAIN:
  EPOCHS: 2
  NUM_TRAIN_SAMPLES: 1917
  EVAL_EVERY_EPOCH: True
  CHECKPOINT_EVERY_EPOCH: True
INPUT:
  EVENT:
    EDGE_WINDOW_RADII_MS: [25, 50, 200]
    BOUNDARY_RADII: [3, 5]
    DROPOUT_PROB: 0.0
    BIN_DROPOUT_PROB: 0.0
DATALOADER:
  NUM_WORKERS: 8
OUTPUT_DIR: "work_dirs/day-exp4a_early_event_edge_adapter_from_stageC_bs4"
