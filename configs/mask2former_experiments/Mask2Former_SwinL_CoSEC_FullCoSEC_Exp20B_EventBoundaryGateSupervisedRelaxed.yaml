      0.00,  # vegetation
      0.00,  # terrain
      0.00,  # sky
      1.00,  # person
      1.00,  # rider
      0.25,  # car
      0.00,  # truck
      0.00,  # bus
      0.00,  # train
      1.00,  # motorcycle
      1.00,  # bicycle
    ]
