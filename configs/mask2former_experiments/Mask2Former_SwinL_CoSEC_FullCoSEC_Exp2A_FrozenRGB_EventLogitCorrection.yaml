_BASE_: Mask2Former_SwinL_CoSEC_EventRes34_Epoch.yaml
DATASETS:
  TRAIN: ("cosec_train_event",)
  TEST: ("cosec_day_val_event", "cosec_night_val_event")
MODEL:
  WEIGHTS: "work_dirs/exp3b_event_edge_class_aware_from_day65_bs40_w0/best_model_cosec_day.pth"
  TRAINABLE_PREFIXES:
    - "event_edge_head."
    - "day_event_boundary_refiner."
  EVENT_FUSION:
    ENABLED: False
  EVENT_EDGE:
    ENABLED: True
    IN_CHANNELS: 9
    HIDDEN_DIM: 64
    USE_RGB_FEATURE: True
    RGB_FEATURE: "res2"
    DETACH_RGB_FEATURE: True
    OUTPUT_STRIDE: 4
    PRIMARY_BOUNDARY_RADIUS: 3
    BCE_WEIGHT: 0.05
    DICE_WEIGHT: 0.05
    POS_WEIGHT_MAX: 20.0
    LOG_EDGE_STATS: True
    TRAIN_ONLY_EDGE: False
    CLASS_AWARE: True
    NUM_CLASSES: 19
    CLASS_BOUNDARY_RADIUS: 3
    CLASS_BCE_WEIGHT: 0.02
    CLASS_POS_WEIGHT_MAX: 20.0
  EVENT_EDGE_GUIDE:
    ENABLED: False
  EVENT_PRESERVE:
    ENABLED: False
  EARLY_EVENT_EDGE_ADAPTER:
    ENABLED: False
  DAY_EVENT_BOUNDARY_REFINER:
    ENABLED: True
    NUM_CLASSES: 19
    EDGE_CHANNELS: 64
    HIDDEN_DIM: 64
    INIT_ALPHA: 0.01
    GATE_BIAS: -4.0
    TOPK_CLASSES: 2
    TAU_MARGIN: 0.30
    ENTROPY_THRESHOLD: 0.50
    UNCERTAIN_FRACTION: 0.20
    EDGE_THRESHOLD: 0.25
    EDGE_PROB_POWER: 1.5
    BOUNDARY_RADIUS: 3
    BOUNDARY_WEIGHT: 0.7
    USE_EVENT_RELIABILITY: True
    USE_RGB_UNCERTAINTY: True
    USE_SEMANTIC_BOUNDARY: True
    REQUIRE_EVENT_ACTIVE: True
    EVENT_ACTIVE_SOURCE: "density"
    EVENT_ACTIVE_THRESHOLD: 0.0
    PRESERVE_CONFIDENCE_THRESHOLD: 0.70
    PRESERVE_MARGIN_THRESHOLD: 0.30
    LOSS_ALLOWED_ONLY: True
    LOSS_ALLOWED_SOFT_THRESHOLD: 0.0
    LOSS_BOUNDARY_CE_WEIGHT: 0.7
    LOSS_UNCERTAIN_CE_WEIGHT: 0.0
    LOSS_CANDIDATE_CE_WEIGHT: 0.10
    CANDIDATE_LOGIT_SCALE: 1.0
    LOSS_PRESERVE_KL_WEIGHT: 2.0
    LOSS_GATE_SPARSE_WEIGHT: 0.001
    LOSS_GATE_INVALID_WEIGHT: 0.005
    LOSS_DELTA_NON_BOUNDARY_WEIGHT: 0.0005
    EDGE_ONLY_CORRECTION: True
    SELECTIVE_REPAIR_GATE_ENABLED: True
    LOSS_REPAIR_GATE_BCE_WEIGHT: 0.05
    REPAIR_GATE_POSITIVE_WEIGHT: 5.0
    REPAIR_GATE_NEGATIVE_WEIGHT: 1.0
    REPAIR_REQUIRE_TARGET_IN_TOPK: True
    REPAIR_SUPERVISE_SCORE: False
    SCORE_PREDICTOR_ENABLED: False
    SCORE_BCE_WEIGHT: 0.0
    SCORE_SPARSITY_WEIGHT: 0.0
    DETACH_BASE_PROB: True
    SKIP_MASK2FORMER_LOSS: True
    LOG_STATS: True
SOLVER:
  IMS_PER_BATCH: 6
  BASE_LR: 0.00002
  AMP:
    ENABLED: True
TRAIN:
  EPOCHS: 3
  NUM_TRAIN_SAMPLES: 2264
  EVAL_EVERY_EPOCH: True
  CHECKPOINT_EVERY_EPOCH: True
INPUT:
  MIN_SIZE_TRAIN: [624, 768, 896]
  MIN_SIZE_TRAIN_SAMPLING: "choice"
  MAX_SIZE_TRAIN: 1400
  MIN_SIZE_TEST: 768
  MAX_SIZE_TEST: 1400
  CROP:
    ENABLED: True
    TYPE: "absolute"
    SIZE: (640, 1280)
    SINGLE_CATEGORY_MAX_AREA: 1.0
  EVENT:
    EDGE_WINDOW_RADII_MS: [25, 50, 200]
    BOUNDARY_RADII: [3, 5]
    DROPOUT_PROB: 0.0
    BIN_DROPOUT_PROB: 0.0
DATALOADER:
  NUM_WORKERS: 8
OUTPUT_DIR: "work_dirs/fullcosec-exp2a_frozen_rgb_event_logit_correction"
