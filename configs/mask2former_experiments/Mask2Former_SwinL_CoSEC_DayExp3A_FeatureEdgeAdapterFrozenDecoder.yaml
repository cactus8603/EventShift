_BASE_: Mask2Former_SwinL_CoSEC_DayExp1C_FullResAllowedCandidate_BoundaryRefiner.yaml
DATASETS:
  TRAIN: ("cosec_day_train_event",)
  TEST: ("cosec_day_val_event",)
MODEL:
  WEIGHTS: "work_dirs/day-exp1c_stageC_head_from_stageB_strong_bs8/model_final.pth"
  TRAINABLE_PREFIXES: []
  EVENT_FUSION:
    ENABLED: False
  EVENT_EDGE:
    ENABLED: True
    IN_CHANNELS: 9
    HIDDEN_DIM: 64
    USE_RGB_FEATURE: True
    RGB_FEATURE: "res2"
    DETACH_RGB_FEATURE: True
    OUTPUT_STRIDE: 4
    PRIMARY_BOUNDARY_RADIUS: 3
    BCE_WEIGHT: 0.0
    DICE_WEIGHT: 0.0
    POS_WEIGHT_MAX: 20.0
    LOG_EDGE_STATS: True
    TRAIN_ONLY_EDGE: False
    CLASS_AWARE: True
    NUM_CLASSES: 19
    CLASS_BOUNDARY_RADIUS: 3
    CLASS_BCE_WEIGHT: 0.0
    CLASS_POS_WEIGHT_MAX: 20.0
  EVENT_EDGE_GUIDE:
    ENABLED: True
    STAGE: "res2"
    INIT_ALPHA: 0.01
    GATE_BIAS: -4.0
    EDGE_PROB_POWER: 2.0
    USE_EVENT_RELIABILITY: True
    RELIABILITY_FLOOR: 0.0
    LOW_LIGHT_ENABLED: False
    LOW_LIGHT_GAIN: 0.0
    SCORE_PREDICTOR_ENABLED: False
    SCORE_SPARSITY_WEIGHT: 0.0
    GATE_SPARSITY_WEIGHT: 0.001
    NON_BOUNDARY_GATE_WEIGHT: 0.005
    LOG_STATS: True
    TRAIN_ONLY_GUIDE: False
    TRAIN_WITH_SEM_SEG_HEAD: False
    TRAIN_EDGE_HEAD: False
    TRAINABLE_PREFIXES:
      - "event_edge_guide."
  EVENT_PRESERVE:
    ENABLED: True
    WEIGHT: 0.5
    CONFIDENCE_THRESHOLD: 0.65
    MARGIN_THRESHOLD: 0.25
    EVENT_EDGE_THRESHOLD: 0.25
    USE_BOUNDARY_TARGET: True
    USE_EVENT_EDGE: True
    LOG_STATS: True
  DAY_EVENT_BOUNDARY_REFINER:
    ENABLED: False
SOLVER:
  IMS_PER_BATCH: 10
  BASE_LR: 0.00001
  AMP:
    ENABLED: True
TRAIN:
  EPOCHS: 2
  NUM_TRAIN_SAMPLES: 1917
  EVAL_EVERY_EPOCH: True
  CHECKPOINT_EVERY_EPOCH: True
INPUT:
  EVENT:
    EDGE_WINDOW_RADII_MS: [25, 50, 200]
    BOUNDARY_RADII: [3, 5]
    DROPOUT_PROB: 0.0
    BIN_DROPOUT_PROB: 0.0
DATALOADER:
  NUM_WORKERS: 6
OUTPUT_DIR: "work_dirs/day-exp3a_feature_edge_adapter_frozen_decoder_from_stageC_bs10"
