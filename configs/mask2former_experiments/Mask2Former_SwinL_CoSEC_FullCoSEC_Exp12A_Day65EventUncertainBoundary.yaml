_BASE_: Mask2Former_SwinL_CoSEC_FullCoSEC_Exp11A_Day65EventActiveMinFilter.yaml
MODEL:
  DAY_EVENT_BOUNDARY_REFINER:
    # Exp11A proved that "event-active only" is too broad for day: early
    # repair_negative was about 20x repair_positive. Exp12A keeps event-active
    # mandatory, but adds RGB uncertainty / semantic-boundary candidate shaping.
    INIT_ALPHA: 0.018
    GATE_BIAS: -3.4
    TOPK_CLASSES: 3
    USE_EVENT_RELIABILITY: False
    USE_RGB_UNCERTAINTY: True
    USE_SEMANTIC_BOUNDARY: True
    REQUIRE_EVENT_ACTIVE: True
    EVENT_ACTIVE_SOURCE: "density"
    EVENT_ACTIVE_THRESHOLD: 0.03
    TAU_MARGIN: 0.35
    ENTROPY_THRESHOLD: 0.45
    UNCERTAIN_FRACTION: 0.20
    EDGE_THRESHOLD: 0.12
    EDGE_PROB_POWER: 0.75
    BOUNDARY_RADIUS: 3
    BOUNDARY_WEIGHT: 0.8
    EDGE_ONLY_CORRECTION: False
    LOSS_ALLOWED_ONLY: True
    LOSS_ALLOWED_SOFT_THRESHOLD: 0.0
    LOSS_BOUNDARY_CE_WEIGHT: 0.35
    LOSS_UNCERTAIN_CE_WEIGHT: 0.15
    LOSS_CANDIDATE_CE_WEIGHT: 0.10
    CANDIDATE_CE_REPAIR_POSITIVE_ONLY: True
    LOSS_PRESERVE_KL_WEIGHT: 4.0
    LOSS_GATE_SPARSE_WEIGHT: 0.003
    LOSS_GATE_INVALID_WEIGHT: 0.008
    LOSS_DELTA_NON_BOUNDARY_WEIGHT: 0.0005
    SELECTIVE_REPAIR_GATE_ENABLED: True
    LOSS_REPAIR_GATE_BCE_WEIGHT: 0.08
    REPAIR_GATE_POSITIVE_WEIGHT: 8.0
    REPAIR_GATE_NEGATIVE_WEIGHT: 1.0
    REPAIR_REQUIRE_TARGET_IN_TOPK: True
SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.000004
OUTPUT_DIR: "work_dirs/fullcosec-exp12a_day65_event_uncertain_boundary_bs8"
