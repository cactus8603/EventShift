_BASE_: Mask2Former_SwinL_CoSEC_EventRes34_Epoch.yaml
DATASETS:
  TRAIN: ("cosec_day_train_event",)
  TEST: ("cosec_day_val_event",)
MODEL:
  WEIGHTS: "work_dirs/exp3b_event_edge_class_aware_from_day65_bs40_w0/best_model_cosec_day.pth"
  TRAINABLE_PREFIXES:
    - "day_event_boundary_refiner."
  EVENT_FUSION:
    ENABLED: False
  EVENT_EDGE:
    ENABLED: True
    IN_CHANNELS: 9
    HIDDEN_DIM: 64
    USE_RGB_FEATURE: True
    RGB_FEATURE: "res2"
    DETACH_RGB_FEATURE: True
    OUTPUT_STRIDE: 4
    PRIMARY_BOUNDARY_RADIUS: 3
    BCE_WEIGHT: 0.0
    DICE_WEIGHT: 0.0
    POS_WEIGHT_MAX: 20.0
    LOG_EDGE_STATS: True
    TRAIN_ONLY_EDGE: False
    CLASS_AWARE: True
    NUM_CLASSES: 19
    CLASS_BOUNDARY_RADIUS: 3
    CLASS_BCE_WEIGHT: 0.0
    CLASS_POS_WEIGHT_MAX: 20.0
  DAY_EVENT_BOUNDARY_REFINER:
    ENABLED: True
    NUM_CLASSES: 19
    EDGE_CHANNELS: 64
    HIDDEN_DIM: 64
    INIT_ALPHA: 0.005
    GATE_BIAS: -5.0
    TOPK_CLASSES: 2
    TAU_MARGIN: 0.30
    ENTROPY_THRESHOLD: 0.50
    UNCERTAIN_FRACTION: 0.20
    EDGE_THRESHOLD: 0.45
    EDGE_PROB_POWER: 3.0
    BOUNDARY_RADIUS: 3
    BOUNDARY_WEIGHT: 0.35
    PRESERVE_CONFIDENCE_THRESHOLD: 0.70
    PRESERVE_MARGIN_THRESHOLD: 0.30
    LOSS_BOUNDARY_CE_WEIGHT: 1.0
    LOSS_UNCERTAIN_CE_WEIGHT: 0.5
    LOSS_PRESERVE_KL_WEIGHT: 1.5
    LOSS_GATE_SPARSE_WEIGHT: 0.010
    LOSS_GATE_INVALID_WEIGHT: 0.020
    LOSS_DELTA_NON_BOUNDARY_WEIGHT: 0.002
    SKIP_MASK2FORMER_LOSS: True
    LOG_STATS: True
SOLVER:
  IMS_PER_BATCH: 10
  BASE_LR: 0.00002
  AMP:
    ENABLED: True
TRAIN:
  EPOCHS: 4
  NUM_TRAIN_SAMPLES: 1917
  EVAL_EVERY_EPOCH: True
  CHECKPOINT_EVERY_EPOCH: True
INPUT:
  EVENT:
    EDGE_WINDOW_RADII_MS: [25, 50, 200]
    BOUNDARY_RADII: [3, 5]
    DROPOUT_PROB: 0.0
    BIN_DROPOUT_PROB: 0.0
DATALOADER:
  NUM_WORKERS: 8
OUTPUT_DIR: "work_dirs/day-exp1b_precise_strict_q20_refiner_from_exp3b"
